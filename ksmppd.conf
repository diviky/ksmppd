# Sample configuration for ksmppd
# Uses database for all functionality (authentication + routing)
#

group=ksmppd
log-file=/tmp/ksmppd.log
log-level=0
smpp-port=2345
database-type=mysql
database-config=demo
database-enable-queue=1
id=KANNELSMPP
inbound-queue-threads=4
outbound-queue-threads=4

group=mysql-connection
id=demo
host=localhost
username=demouser
password=demopass
database=kannel_smpp_demo
max-connections=5

group=bearerbox-connection
id=KSMPPD
host=localhost
port=14001

group=http-server
port=14010
password=ksmppdpass

group=smpp-routing
routing-method=1

# Optional: vendor / non-standard SMPP TLVs (e.g. 0x1401). Omit smsc-id so definitions apply
# under Kannel DEFAULT_SMSC_ID. Required if you link an older libgw that crashes on unknown
# TLVs when no smpp-tlv nested dict exists; define tags you need, for example:
#group=smpp-tlv
#name=cost_center_ref
#tag=5121
#length=100
#type=octetstring
# smsc-id=...   ; optional; omit to use default bucket (matches ksmppd unpack with NULL smsc)



