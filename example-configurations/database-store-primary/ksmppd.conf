# Sample configuration for ksmppd - Database Store Primary Mode
# MT messages stored in database, ACK sent immediately with unique message_id.
# No bearerbox required. DLRs read from smpp_dlr table and delivered to ESMEs.
#

group=ksmppd
log-file=/tmp/ksmppd.log
log-level=0
smpp-port=2345
database-type=mysql
database-config=demo
database-enable-queue=1
database-store-primary=1
database-dlr-table=smpp_dlr
id=KANNELSMPP
inbound-queue-threads=4
outbound-queue-threads=4
# 1 = Database
auth-method=1

group=mysql-connection
id=demo
host=localhost
username=demouser
password=demopass
database=kannel_smpp_demo
max-connections=5

# No bearerbox-connection needed when database-store-primary=1
# group=bearerbox-connection
# id=KSMPPD
# host=localhost
# port=14001

group=http-server
port=14010
password=ksmppdpass

group=smpp-routing
# 1 = Database
routing-method=1
